<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Display a map on a webpage</title>
<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
<link href="https://api.mapbox.com/styles/v1/paunofu/ckzwlnu0m000114kcbxg931s7.html?title=copy&access_token=pk.eyJ1IjoicGF1bm9mdSIsImEiOiJja3d5dmQ1OXYwMWE0Mm9xenFhMjF1aXdwIn0.dMChylER_5M1j5j7JSl9SQ&zoomwheel=true&fresh=true#10.89/38.779/-0.0103" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v2.7.0/mapbox-gl.js"></script>
<style>
body { margin: 0; padding: 0; }
#map { position: absolute; top: 0; bottom: 0; width: 100%; }
</style>
</head>
<body>
<div id="map"></div>
<script>
	mapboxgl.accessToken = 'pk.eyJ1IjoicGF1bm9mdSIsImEiOiJja3d5dmQ1OXYwMWE0Mm9xenFhMjF1aXdwIn0.dMChylER_5M1j5j7JSl9SQ';
    const map = new mapboxgl.Map({
        container: 'map', // container ID
        style: 'mapbox://styles/paunofu/ckzwlnu0m000114kcbxg931s7', // style URL
        center: [-74.5, 40], // starting position [lng, lat]
        zoom: 9 // starting zoom
    });
</script>

</body>
</html>
